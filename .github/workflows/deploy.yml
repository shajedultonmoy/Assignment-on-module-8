name: Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Deploy
      uses: appleboy/ssh-action@master

      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}

        script: |
          cd ~/Assignment-on-module-8
          git pull origin main
          docker compose down
          docker compose up -d --build